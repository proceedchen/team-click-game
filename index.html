<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta
      name="description"
      content="钉钉扫码即可打开的数据点击小游戏，1分钟限时挑战！"
    />
    <title>数据点击器 | 1分钟挑战</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #07111f;
        --bg-2: #0c1b33;
        --bg-3: #17345e;
        --panel: rgba(10, 18, 35, 0.72);
        --panel-border: rgba(140, 183, 255, 0.18);
        --text: #eef4ff;
        --muted: rgba(238, 244, 255, 0.72);
        --accent: #76d6ff;
        --accent-2: #7bffcc;
        --shadow: rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top, rgba(118, 214, 255, 0.22), transparent 35%),
          radial-gradient(circle at 20% 20%, rgba(123, 255, 204, 0.12), transparent 28%),
          linear-gradient(160deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
        color: var(--text);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(8px);
        opacity: 0.55;
      }

      body::before {
        width: 240px;
        height: 240px;
        left: -90px;
        top: -60px;
        background: radial-gradient(circle, rgba(118, 214, 255, 0.22), transparent 70%);
      }

      body::after {
        width: 320px;
        height: 320px;
        right: -120px;
        bottom: -100px;
        background: radial-gradient(circle, rgba(123, 255, 204, 0.16), transparent 72%);
      }

      .app {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 22px);
      }

      .page {
        display: none;
        flex-direction: column;
        height: 100%;
      }

      .page.active {
        display: flex;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .title-block {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
        font-weight: 800;
      }

      .timer-card {
        min-width: 100px;
        padding: 14px 16px;
        border-radius: 18px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: 0 10px 40px var(--shadow);
        backdrop-filter: blur(18px);
        text-align: center;
      }

      .timer-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .timer-value {
        font-size: 32px;
        line-height: 1;
        font-weight: 900;
        color: #ffffff;
      }

      .timer-value.warning {
        color: #ff6b6b;
        animation: blink 500ms infinite;
      }

      @keyframes blink {
        50% { opacity: 0.5; }
      }

      .stage {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }

      .term-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .term {
        position: absolute;
        left: 50%;
        top: 48%;
        transform: translate(-50%, -50%) scale(0.86);
        padding: 10px 16px;
        border-radius: 999px;
        color: #f7fbff;
        background: linear-gradient(135deg, rgba(118, 214, 255, 0.18), rgba(123, 255, 204, 0.16));
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        font-weight: 800;
        letter-spacing: 0.04em;
        opacity: 0;
        animation: floatUp 1200ms ease-out forwards;
        user-select: none;
        will-change: transform, opacity;
      }

      .term small {
        display: block;
        margin-top: 4px;
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.8);
        letter-spacing: 0;
      }

      .button-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 16px;
      }

      .tap-button {
        width: min(78vw, 320px);
        aspect-ratio: 1 / 1;
        border: none;
        border-radius: 30px;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.28), transparent 30%),
          linear-gradient(180deg, #58d9ff, #1e97ff 55%, #1152d4);
        color: white;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.08em;
        box-shadow:
          0 24px 50px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.32),
          inset 0 -18px 30px rgba(0, 0, 0, 0.16);
        transform: translateZ(0);
        transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      }

      .tap-button:active {
        transform: scale(0.97);
        filter: brightness(1.03);
        box-shadow:
          0 18px 36px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.28),
          inset 0 -14px 24px rgba(0, 0, 0, 0.14);
      }

      .tap-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .tap-button .subtitle {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: rgba(255, 255, 255, 0.88);
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .chip {
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(9, 16, 31, 0.38);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
      }

      @keyframes floatUp {
        0% {
          opacity: 0;
          transform: translate(-50%, -20%) scale(0.78);
          filter: blur(1px);
        }
        18% {
          opacity: 1;
          transform: translate(calc(-50% + var(--x, 0px)), calc(-50% + var(--y, 0px))) scale(1);
          filter: blur(0);
        }
        100% {
          opacity: 0;
          transform: translate(calc(-50% + var(--x, 0px)), calc(-50% - 92px + var(--y, 0px))) scale(1.08);
          filter: blur(0.3px);
        }
      }

      .pulse {
        animation: pulse 260ms ease-out;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.03); }
        100% { transform: scale(1); }
      }

      /* Start Page */
      .start-page {
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 40px;
      }

      .start-page h1 {
        font-size: 32px;
      }

      .start-page .desc {
        color: var(--muted);
        font-size: 16px;
        max-width: 280px;
      }

      .start-button {
        padding: 20px 60px;
        font-size: 22px;
        font-weight: 800;
        border: none;
        border-radius: 60px;
        background: linear-gradient(135deg, #58d9ff, #1e97ff);
        color: white;
        box-shadow: 0 10px 40px rgba(30, 151, 255, 0.4);
        cursor: pointer;
        transition: transform 200ms ease, box-shadow 200ms ease;
      }

      .start-button:active {
        transform: scale(0.95);
      }

      /* Result Page */
      .result-page {
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 30px;
      }

      .result-page h1 {
        font-size: 28px;
      }

      .score-display {
        padding: 30px 50px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: 0 10px 40px var(--shadow);
        backdrop-filter: blur(18px);
      }

      .score-label {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .score-value {
        font-size: 64px;
        font-weight: 900;
        color: #ffffff;
        text-shadow: 0 8px 24px rgba(118, 214, 255, 0.28);
      }

      .leaderboard {
        width: 100%;
        max-width: 320px;
        padding: 20px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
      }

      .leaderboard h3 {
        margin: 0 0 16px;
        font-size: 16px;
        color: var(--muted);
      }

      .leaderboard-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .leaderboard-item {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 15px;
      }

      .leaderboard-item:last-child {
        border-bottom: none;
      }

      .leaderboard-item .rank {
        color: var(--accent);
        font-weight: 700;
        width: 30px;
      }

      .leaderboard-item .score {
        font-weight: 700;
        color: var(--accent-2);
      }

      .restart-button {
        padding: 16px 48px;
        font-size: 18px;
        font-weight: 700;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, #7bffcc, #58d9ff);
        color: #07111f;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(123, 255, 204, 0.3);
        transition: transform 200ms ease;
      }

      .restart-button:active {
        transform: scale(0.95);
      }

      @media (max-width: 420px) {
        h1 { font-size: 20px; }
        .timer-value { font-size: 28px; }
        .tap-button { font-size: 24px; }
        .start-page h1 { font-size: 26px; }
        .score-value { font-size: 48px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <!-- 开始页面 -->
      <section id="startPage" class="page start-page active">
        <div>
          <h1>数据点击器</h1>
          <p class="desc">1分钟内点击按钮<br/>看看你能点多少次？</p>
        </div>
        <button id="startButton" class="start-button" type="button">开始挑战</button>
        <div class="chip">适合钉钉扫码打开</div>
      </section>

      <!-- 游戏页面 -->
      <section id="gamePage" class="page game-page">
        <header class="topbar">
          <div class="title-block">
            <div class="eyebrow">SCAN · TAP · COUNT</div>
            <h1>数据点击器</h1>
          </div>
          <div class="timer-card" aria-live="polite">
            <div class="timer-label">剩余时间</div>
            <div id="timer" class="timer-value">60</div>
          </div>
        </header>

        <section class="stage" aria-label="点击游戏区域">
          <div id="termLayer" class="term-layer" aria-hidden="true"></div>
        </section>

        <section class="button-zone">
          <button id="tapButton" class="tap-button" type="button">
            点击
            <span class="subtitle">Tap to count</span>
          </button>
        </section>

        <footer class="footer">
          <div class="chip">当前点击</div>
          <div id="counter" class="chip">0</div>
        </footer>
      </section>

      <!-- 结果页面 -->
      <section id="resultPage" class="page result-page">
        <h1>挑战结束！</h1>

        <div class="score-display">
          <div class="score-label">你的点击次数</div>
          <div id="finalScore" class="score-value">0</div>
        </div>

        <div class="leaderboard">
          <h3>🏆 排行榜 TOP10</h3>
          <ul id="leaderboardList" class="leaderboard-list">
            <li class="leaderboard-item"><span class="rank">-</span><span>加载中...</span></li>
          </ul>
        </div>

        <button id="restartButton" class="restart-button" type="button">再来一次</button>
      </section>
    </main>

    <script>
      // DOM 元素
      const startPage = document.getElementById('startPage');
      const gamePage = document.getElementById('gamePage');
      const resultPage = document.getElementById('resultPage');
      const startButton = document.getElementById('startButton');
      const tapButton = document.getElementById('tapButton');
      const restartButton = document.getElementById('restartButton');
      const timerEl = document.getElementById('timer');
      const counterEl = document.getElementById('counter');
      const termLayer = document.getElementById('termLayer');
      const finalScoreEl = document.getElementById('finalScore');
      const leaderboardList = document.getElementById('leaderboardList');

      // 游戏状态
      let count = 0;
      let timeLeft = 60;
      let timerInterval = null;
      let gameActive = false;

      const terms = [
        { label: "DAU", meaning: "Daily Active Users" },
        { label: "DATA", meaning: "数据资产" },
        { label: "DW", meaning: "Data Warehouse" },
        { label: "ETL", meaning: "抽取 · 转换 · 加载" },
        { label: "BI", meaning: "Business Intelligence" },
        { label: "SQL", meaning: "结构化查询语言" },
        { label: "OLAP", meaning: "联机分析处理" },
        { label: "KPI", meaning: "关键绩效指标" },
        { label: "MAU", meaning: "Monthly Active Users" },
        { label: "RFM", meaning: "最近消费 · 频次 · 金额" },
        { label: "AARRR", meaning: "增长漏斗模型" },
        { label: "CDP", meaning: "客户数据平台" },
      ];

      // 页面切换
      function showPage(page) {
        startPage.classList.remove('active');
        gamePage.classList.remove('active');
        resultPage.classList.remove('active');
        page.classList.add('active');
      }

      // 开始游戏
      function startGame() {
        count = 0;
        timeLeft = 60;
        gameActive = true;

        counterEl.textContent = '0';
        timerEl.textContent = '60';
        timerEl.classList.remove('warning');

        showPage(gamePage);

        // 倒计时
        timerInterval = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;

          if (timeLeft <= 10) {
            timerEl.classList.add('warning');
          }

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      // 结束游戏
      function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        tapButton.disabled = true;

        finalScoreEl.textContent = count;

        // 提交分数
        submitScore(count);

        // 获取排行榜
        loadLeaderboard();

        showPage(resultPage);
      }

      // 提交分数
      async function submitScore(score) {
        try {
          await fetch('/api/submit-score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ score })
          });
        } catch (e) {
          console.error('提交分数失败:', e);
        }
      }

      // 加载排行榜
      async function loadLeaderboard() {
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();

          if (data.leaderboard && data.leaderboard.length > 0) {
            leaderboardList.innerHTML = data.leaderboard.map((item, idx) => `
              <li class="leaderboard-item">
                <span class="rank">${idx + 1}</span>
                <span class="score">${item.score} 次</span>
              </li>
            `).join('');
          } else {
            leaderboardList.innerHTML = '<li class="leaderboard-item"><span>-</span><span>暂无数据</span></li>';
          }
        } catch (e) {
          console.error('加载排行榜失败:', e);
          leaderboardList.innerHTML = '<li class="leaderboard-item"><span>-</span><span>加载失败</span></li>';
        }
      }

      // 重新开始
      function restartGame() {
        tapButton.disabled = false;
        startGame();
      }

      // 更新计数器
      function updateCounter() {
        counterEl.textContent = String(count);
        counterEl.classList.remove('pulse');
        void counterEl.offsetWidth;
        counterEl.classList.add('pulse');
      }

      // 显示术语
      function spawnTerm() {
        const term = terms[Math.floor(Math.random() * terms.length)];
        const node = document.createElement('div');
        node.className = 'term';

        const x = (Math.random() * 56 - 28).toFixed(1) + 'px';
        const y = (Math.random() * 18 - 9).toFixed(1) + 'px';
        node.style.setProperty('--x', x);
        node.style.setProperty('--y', y);
        node.innerHTML = `${term.label}<small>${term.meaning}</small>`;

        termLayer.appendChild(node);
        setTimeout(() => node.remove(), 1250);
      }

      // 事件监听
      startButton.addEventListener('click', startGame);
      restartButton.addEventListener('click', restartGame);

      tapButton.addEventListener('click', () => {
        if (!gameActive) return;
        count++;
        updateCounter();
        spawnTerm();
      });

      tapButton.addEventListener('pointerdown', () => {
        tapButton.setAttribute('aria-pressed', 'true');
      });

      tapButton.addEventListener('pointerup', () => {
        tapButton.setAttribute('aria-pressed', 'false');
      });

      tapButton.addEventListener('pointercancel', () => {
        tapButton.setAttribute('aria-pressed', 'false');
      });
    </script>
  </body>
</html>
