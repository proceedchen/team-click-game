<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数据跳舞机</title>
    <style>
      :root {
        --bg-0: #07111f;
        --bg-1: #0d1929;
        --bg-2: #162336;
        --bg-3: #1d2e44;
        --text: #ffffff;
        --text-dim: #7489a6;
        --accent: #58d9ff;
        --accent-2: #7bffcc;
        --panel: rgba(22, 35, 54, 0.8);
        --panel-border: rgba(88, 217, 255, 0.15);
        --shadow: rgba(0, 0, 0, 0.3);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(160deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
        color: var(--text);
        min-height: 100vh;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      .app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        position: relative;
      }

      .page {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 30px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 300ms ease, visibility 300ms ease;
      }

      .page.active {
        opacity: 1;
        visibility: visible;
      }

      h1 {
        font-size: 32px;
        font-weight: 900;
        margin-bottom: 20px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .desc {
        font-size: 16px;
        color: var(--text-dim);
        line-height: 1.6;
        margin-bottom: 20px;
      }

      /* Start Page */
      .start-page { gap: 20px; }
      .start-page h1 { font-size: 36px; }

      .nickname-input { margin: 10px 0; }
      .nickname-input input {
        width: 200px;
        padding: 12px 16px;
        font-size: 16px;
        border: 2px solid var(--accent);
        border-radius: 10px;
        text-align: center;
        background: rgba(255,255,255,0.1);
        color: white;
        outline: none;
      }
      .nickname-input input::placeholder { color: var(--text-dim); }
      .nickname-input input:focus {
        border-color: var(--accent-2);
        box-shadow: 0 0 15px rgba(88, 217, 255, 0.3);
      }

      .start-button {
        padding: 20px 60px;
        font-size: 22px;
        font-weight: 800;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, var(--accent), #1e97ff);
        color: white;
        box-shadow: 0 10px 40px rgba(30, 151, 255, 0.4);
        cursor: pointer;
        transition: transform 200ms ease;
      }
      .start-button:active { transform: scale(0.95); }

      .leaderboard-button {
        margin-top: 15px;
        padding: 12px 30px;
        font-size: 16px;
        font-weight: 600;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background: transparent;
        color: rgba(255, 255, 255, 0.8);
        cursor: pointer;
        transition: all 200ms ease;
      }
      .leaderboard-button:active { transform: scale(0.95); }

      .chip {
        margin-top: 20px;
        padding: 8px 16px;
        border-radius: 20px;
        background: rgba(255,255,255,0.08);
        font-size: 12px;
        color: var(--text-dim);
      }

      /* Leaderboard Page */
      .leaderboard-page h1 { font-size: 28px; }

      .leaderboard-modal {
        width: 100%;
        max-width: 320px;
        padding: 20px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
      }

      .leaderboard-modal .leaderboard-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .leaderboard-modal .leaderboard-item {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 15px;
      }

      .leaderboard-modal .rank { color: var(--accent); font-weight: 700; width: 30px; }
      .leaderboard-modal .nickname { flex: 1; text-align: left; padding-left: 10px; color: #fff; }
      .leaderboard-modal .score { font-weight: 700; color: var(--accent-2); }

      .back-button {
        margin-top: 20px;
        padding: 12px 32px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        cursor: pointer;
      }

      /* Game Page */
      .game-page { justify-content: space-between; padding-top: 20px; padding-bottom: 20px; }

      .topbar {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
      }

      .title-block { text-align: left; }
      .eyebrow { font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 4px; }
      .topbar h1 { font-size: 20px; margin: 0; }

      .timer-card {
        padding: 10px 20px;
        border-radius: 15px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        text-align: center;
      }
      .timer-label { font-size: 10px; color: var(--text-dim); }
      .timer-value { font-size: 28px; font-weight: 900; color: var(--accent); }
      .timer-value.warning { color: #ff5858; animation: pulse 0.5s infinite; }

      /* Dance Stage */
      .stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      /* Arrow Indicator */
      .arrow-indicator {
        font-size: 60px;
        margin-bottom: 20px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s ease;
      }
      .arrow-indicator.up { color: #ff6b6b; transform: translateY(-20px); }
      .arrow-indicator.down { color: #4ecdc4; transform: translateY(20px); }
      .arrow-indicator.left { color: #ffe66d; transform: translateX(-20px); }
      .arrow-indicator.right { color: #95e1d3; transform: translateX(20px); }
      .arrow-indicator.show { animation: arrowPop 0.3s ease; }

      @keyframes arrowPop {
        0% { transform: scale(0.5); opacity: 0; }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); opacity: 1; }
      }

      /* Dancing Girl */
      .dancer {
        font-size: 100px;
        line-height: 1;
        transition: transform 0.15s ease;
        cursor: default;
      }
      .dancer.jump-up { transform: translateY(-40px) rotate(-10deg); }
      .dancer.jump-down { transform: translateY(30px) scaleY(0.8); }
      .dancer.jump-left { transform: translateX(-40px) rotate(-15deg); }
      .dancer.jump-right { transform: translateX(40px) rotate(15deg); }
      .dancer.correct { animation: correctPulse 0.2s ease; }
      .dancer.wrong { animation: wrongShake 0.3s ease; }

      @keyframes correctPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); filter: brightness(1.3); }
      }
      @keyframes wrongShake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }

      .footer {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .score-chip {
        padding: 10px 20px;
        border-radius: 25px;
        background: var(--panel);
        border: 1px solid var(--accent);
        font-size: 18px;
        font-weight: 700;
        color: var(--accent-2);
      }
      .score-label { font-size: 12px; color: var(--text-dim); font-weight: 400; }

      /* Result Page */
      .result-page { gap: 25px; }
      .result-page h1 { font-size: 28px; }

      .score-display {
        padding: 30px 50px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
      }
      .score-label { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }
      .score-value { font-size: 64px; font-weight: 900; color: #ffffff; }

      .leaderboard { width: 100%; max-width: 320px; }
      .leaderboard h3 { margin: 0 0 16px; font-size: 16px; color: var(--text-dim); }
      .leaderboard-list { list-style: none; padding: 0; margin: 0; }
      .leaderboard-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 15px; }
      .leaderboard-item .rank { color: var(--accent); font-weight: 700; width: 30px; }
      .leaderboard-item .nickname { flex: 1; text-align: left; padding-left: 10px; }
      .leaderboard-item .score { font-weight: 700; color: var(--accent-2); }

      .restart-button {
        padding: 16px 48px;
        font-size: 18px;
        font-weight: 700;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        color: var(--bg-0);
        cursor: pointer;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @media (max-width: 420px) {
        h1 { font-size: 24px; }
        .dancer { font-size: 80px; }
        .arrow-indicator { font-size: 50px; }
        .score-value { font-size: 48px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <!-- 开始页面 -->
      <section id="startPage" class="page start-page active">
        <div>
          <h1>🎮 数据跳舞机</h1>
          <p class="desc">10秒内根据箭头方向<br/>按下对应键盘按键</p>
        </div>
        <div class="nickname-input">
          <input type="text" id="nicknameInput" placeholder="请输入你的昵称" maxlength="10" />
        </div>
        <button id="startButton" class="start-button" type="button">开始挑战</button>
        <button id="leaderboardButton" class="leaderboard-button" type="button">🏆 排行榜</button>
        <div class="chip">⬅️⬆️⬇️➡️ 使用方向键</div>
      </section>

      <!-- 排行榜页面 -->
      <section id="leaderboardPage" class="page leaderboard-page">
        <h1>🏆 排行榜</h1>
        <div class="leaderboard-modal">
          <ul id="leaderboardList2" class="leaderboard-list"></ul>
        </div>
        <button id="backButton" class="back-button" type="button">返回</button>
      </section>

      <!-- 游戏页面 -->
      <section id="gamePage" class="page game-page">
        <header class="topbar">
          <div class="title-block">
            <div class="eyebrow">DANCE · RHYTHM · SCORE</div>
            <h1>数据跳舞机</h1>
          </div>
          <div class="timer-card" aria-live="polite">
            <div class="timer-label">剩余时间</div>
            <div id="timer" class="timer-value">10</div>
          </div>
        </header>

        <section class="stage">
          <div id="arrowIndicator" class="arrow-indicator">⬆️</div>
          <div id="dancer" class="dancer">💃</div>
        </section>

        <footer class="footer">
          <div class="score-chip">
            <span class="score-label">正确 </span>
            <span id="counter">0</span>
            <span class="score-label"> 次</span>
          </div>
        </footer>
      </section>

      <!-- 结果页面 -->
      <section id="resultPage" class="page result-page">
        <h1>🎉 挑战结束！</h1>

        <div class="score-display">
          <div class="score-label">你的得分</div>
          <div id="finalScore" class="score-value">0</div>
        </div>

        <div class="leaderboard">
          <h3>🏆 排行榜 TOP10</h3>
          <ul id="leaderboardList" class="leaderboard-list">
            <li class="leaderboard-item"><span class="rank">-</span><span>加载中...</span></li>
          </ul>
        </div>

        <button id="restartButton" class="restart-button" type="button">再来一次</button>
      </section>
    </main>

    <script>
      // DOM 元素
      const startPage = document.getElementById('startPage');
      const gamePage = document.getElementById('gamePage');
      const resultPage = document.getElementById('resultPage');
      const leaderboardPage = document.getElementById('leaderboardPage');
      const startButton = document.getElementById('startButton');
      const leaderboardButton = document.getElementById('leaderboardButton');
      const backButton = document.getElementById('backButton');
      const restartButton = document.getElementById('restartButton');
      const timerEl = document.getElementById('timer');
      const counterEl = document.getElementById('counter');
      const dancerEl = document.getElementById('dancer');
      const arrowIndicator = document.getElementById('arrowIndicator');
      const finalScoreEl = document.getElementById('finalScore');
      const leaderboardList = document.getElementById('leaderboardList');
      const leaderboardList2 = document.getElementById('leaderboardList2');
      const nicknameInput = document.getElementById('nicknameInput');

      // 游戏状态
      let count = 0;
      let timeLeft = 10;
      let timerInterval = null;
      let gameActive = false;
      let currentArrow = '';
      let arrowTimeout = null;

      // 箭头配置
      const arrows = [
        { key: 'ArrowUp', symbol: '⬆️', direction: 'up', class: 'up' },
        { key: 'ArrowDown', symbol: '⬇️', direction: 'down', class: 'down' },
        { key: 'ArrowLeft', symbol: '⬅️', direction: 'left', class: 'left' },
        { key: 'ArrowRight', symbol: '➡️', direction: 'right', class: 'right' }
      ];

      // 页面切换
      function showPage(page) {
        startPage.classList.remove('active');
        gamePage.classList.remove('active');
        resultPage.classList.remove('active');
        leaderboardPage.classList.remove('active');
        page.classList.add('active');
      }

      // 渲染排行榜
      function renderLeaderboard(data, container) {
        if (data.leaderboard && data.leaderboard.length > 0) {
          container.innerHTML = data.leaderboard.map((item, idx) => `
            <li class="leaderboard-item">
              <span class="rank">${idx + 1}</span>
              <span class="nickname">${item.nickname}</span>
              <span class="score">${item.score}分</span>
            </li>`).join('');
        } else {
          container.innerHTML = '<li class="leaderboard-item"><span>-暂无数据-</span></li>';
        }
      }

      // 加载排行榜
      async function loadLeaderboard() {
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          renderLeaderboard(data, leaderboardList);
        } catch (e) {
          console.error('加载排行榜失败:', e);
          leaderboardList.innerHTML = '<li class="leaderboard-item"><span>-加载失败-</span></li>';
        }
      }

      // 显示新箭头
      function showNewArrow() {
        if (!gameActive) return;

        // 随机选择一个箭头
        const arrow = arrows[Math.floor(Math.random() * arrows.length)];
        currentArrow = arrow.key;

        arrowIndicator.textContent = arrow.symbol;
        arrowIndicator.className = 'arrow-indicator show ' + arrow.class;

        // 1.5秒后自动切换到下一个箭头（如果不按的话）
        if (arrowTimeout) clearTimeout(arrowTimeout);
        arrowTimeout = setTimeout(() => {
          if (gameActive) showNewArrow();
        }, 1500);
      }

      // 处理按键
      function handleKeyDown(e) {
        if (!gameActive) return;
        if (!arrows.find(a => a.key === e.key)) return;

        e.preventDefault();

        const arrow = arrows.find(a => a.key === e.key);
        const isCorrect = e.key === currentArrow;

        // 角色动画
        if (isCorrect) {
          count++;
          counterEl.textContent = count;
          dancerEl.className = 'dancer jump-' + arrow.direction + ' correct';
          showNewArrow(); // 正确后立即切换
        } else {
          dancerEl.className = 'dancer wrong';
        }

        // 清除动画類
        setTimeout(() => {
          dancerEl.className = 'dancer';
        }, 200);
      }

      // 开始游戏
      function startGame() {
        const nickname = nicknameInput.value.trim() || '匿名玩家';
        localStorage.setItem('playerNickname', nickname);

        count = 0;
        timeLeft = 10;
        gameActive = true;

        counterEl.textContent = '0';
        timerEl.textContent = '10';
        timerEl.classList.remove('warning');
        dancerEl.className = 'dancer';

        showPage(gamePage);

        // 第一次显示箭头
        showNewArrow();

        // 倒计时
        timerInterval = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;

          if (timeLeft <= 3) {
            timerEl.classList.add('warning');
          }

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      // 结束游戏
      function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        if (arrowTimeout) clearTimeout(arrowTimeout);

        finalScoreEl.textContent = count;

        // 提交分数
        submitScore(count);

        // 获取排行榜
        loadLeaderboard();

        showPage(resultPage);
      }

      // 提交分数
      async function submitScore(score) {
        const nickname = localStorage.getItem('playerNickname') || '匿名玩家';
        try {
          await fetch('/api/submit-score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ score, nickname })
          });
        } catch (e) {
          console.error('提交分数失败:', e);
        }
      }

      // 重新开始
      function restartGame() {
        showPage(startPage);
      }

      // 事件监听
      startButton.addEventListener('click', startGame);
      restartButton.addEventListener('click', restartGame);

      // 排行榜按钮
      leaderboardButton.addEventListener('click', async () => {
        showPage(leaderboardPage);
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          renderLeaderboard(data, leaderboardList2);
        } catch (e) {
          console.error('加载排行榜失败:', e);
          leaderboardList2.innerHTML = '<li class="leaderboard-item"><span>-加载失败-</span></li>';
        }
      });

      // 返回按钮
      backButton.addEventListener('click', () => {
        showPage(startPage);
      });

      // 键盘事件
      document.addEventListener('keydown', handleKeyDown);

      // 触摸事件（手机端支持）
      let touchStartX = 0;
      let touchStartY = 0;

      document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        if (!gameActive) return;

        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const dx = touchEndX - touchStartX;
        const dy = touchEndY - touchStartY;

        // 判断滑动方向
        if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return; // 移动距离太短

        let key = '';
        if (Math.abs(dx) > Math.abs(dy)) {
          key = dx > 0 ? 'ArrowRight' : 'ArrowLeft';
        } else {
          key = dy > 0 ? 'ArrowDown' : 'ArrowUp';
        }

        // 模拟按键
        handleKeyDown({ key, preventDefault: () => {} });
      }, { passive: true });
    </script>
  </body>
</html>
