<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>点击吃苹果</title>
    <style>
      :root {
        --accent: #ff6b6b;
        --accent-2: #7bffcc;
        --panel: rgba(22, 35, 54, 0.8);
        --panel-border: rgba(88, 217, 255, 0.15);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(180deg, #1a3d16, #234d1e 60%, #2d6b2f);
        color: #fff;
        min-height: 100vh;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
      }

      .app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        position: relative;
      }

      .page {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 30px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 300ms ease, visibility 300ms ease;
      }

      .page.active {
        opacity: 1;
        visibility: visible;
      }

      h1 {
        font-size: 32px;
        font-weight: 900;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #ff6b6b, #ffa500);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .desc {
        font-size: 16px;
        color: #a8d5a2;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      /* Start Page */
      .start-page { gap: 20px; }
      .start-page h1 { font-size: 36px; }

      .nickname-input { margin: 10px 0; }
      .nickname-input input {
        width: 200px;
        padding: 12px 16px;
        font-size: 16px;
        border: 2px solid var(--accent);
        border-radius: 10px;
        text-align: center;
        background: rgba(255,255,255,0.1);
        color: white;
        outline: none;
      }
      .nickname-input input::placeholder { color: #a8d5a2; }
      .nickname-input input:focus {
        border-color: var(--accent-2);
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
      }

      .start-button {
        padding: 20px 60px;
        font-size: 22px;
        font-weight: 800;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, #ff6b6b, #ffa500);
        color: white;
        box-shadow: 0 10px 40px rgba(255, 107, 107, 0.4);
        cursor: pointer;
        transition: transform 200ms ease;
      }
      .start-button:active { transform: scale(0.95); }

      .leaderboard-button {
        margin-top: 15px;
        padding: 12px 30px;
        font-size: 16px;
        font-weight: 600;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background: transparent;
        color: rgba(255, 255, 255, 0.8);
        cursor: pointer;
        transition: all 200ms ease;
      }
      .leaderboard-button:active { transform: scale(0.95); }

      .chip {
        margin-top: 20px;
        padding: 8px 16px;
        border-radius: 20px;
        background: rgba(255,255,255,0.08);
        font-size: 12px;
        color: #a8d5a2;
      }

      /* Leaderboard Page */
      .leaderboard-page h1 { font-size: 28px; }

      .leaderboard-modal {
        width: 100%;
        max-width: 320px;
        padding: 20px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
      }

      .leaderboard-modal .leaderboard-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .leaderboard-modal .leaderboard-item {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 15px;
      }

      .leaderboard-modal .rank { color: var(--accent); font-weight: 700; width: 30px; }
      .leaderboard-modal .nickname { flex: 1; text-align: left; padding-left: 10px; color: #fff; }
      .leaderboard-modal .score { font-weight: 700; color: var(--accent-2); }

      .back-button {
        margin-top: 20px;
        padding: 12px 32px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        cursor: pointer;
      }

      /* Game Page */
      .game-page {
        justify-content: space-between;
        padding-top: 20px;
        padding-bottom: 20px;
        cursor: crosshair;
      }

      .topbar {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        z-index: 10;
      }

      .title-block { text-align: left; }
      .eyebrow { font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 4px; }
      .topbar h1 { font-size: 20px; margin: 0; }

      .timer-card {
        padding: 10px 20px;
        border-radius: 15px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        text-align: center;
      }
      .timer-label { font-size: 10px; color: #a8d5a2; }
      .timer-value { font-size: 28px; font-weight: 900; color: var(--accent); }
      .timer-value.warning { color: #ff5858; animation: pulse 0.5s infinite; }

      /* Game Area */
      .game-area {
        flex: 1;
        position: relative;
        width: 100%;
        overflow: hidden;
      }

      /* Apple */
      .apple {
        position: absolute;
        font-size: 40px;
        cursor: pointer;
        transition: transform 0.1s ease;
        user-select: none;
        -webkit-user-select: none;
      }
      .apple:hover {
        transform: scale(1.1);
      }
      .apple.eaten {
        animation: applePop 0.3s ease forwards;
      }
      @keyframes applePop {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(2); opacity: 0; }
      }

      /* Click effect */
      .click-effect {
        position: absolute;
        font-size: 20px;
        pointer-events: none;
        animation: floatUp 0.5s ease forwards;
      }
      @keyframes floatUp {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-30px); opacity: 0; }
      }

      /* Score popup */
      .score-popup {
        position: absolute;
        font-size: 24px;
        font-weight: bold;
        color: #ff6b6b;
        pointer-events: none;
        animation: scoreFloat 0.8s ease forwards;
      }
      @keyframes scoreFloat {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
        100% { transform: translateY(-50px) scale(1); opacity: 0; }
      }

      .footer {
        display: flex;
        align-items: center;
        gap: 15px;
        z-index: 10;
      }
      .score-chip {
        padding: 10px 20px;
        border-radius: 25px;
        background: var(--panel);
        border: 1px solid var(--accent);
        font-size: 18px;
        font-weight: 700;
        color: var(--accent-2);
      }
      .score-label { font-size: 12px; color: #a8d5a2; font-weight: 400; }

      /* Result Page */
      .result-page { gap: 25px; }
      .result-page h1 { font-size: 28px; }

      .score-display {
        padding: 30px 50px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
      }
      .score-label { font-size: 14px; color: #a8d5a2; margin-bottom: 8px; }
      .score-value { font-size: 64px; font-weight: 900; color: #ffffff; }

      .leaderboard { width: 100%; max-width: 320px; }
      .leaderboard h3 { margin: 0 0 16px; font-size: 16px; color: #a8d5a2; }
      .leaderboard-list { list-style: none; padding: 0; margin: 0; }
      .leaderboard-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 15px; }
      .leaderboard-item .rank { color: var(--accent); font-weight: 700; width: 30px; }
      .leaderboard-item .nickname { flex: 1; text-align: left; padding-left: 10px; }
      .leaderboard-item .score { font-weight: 700; color: var(--accent-2); }

      .restart-button {
        padding: 16px 48px;
        font-size: 18px;
        font-weight: 700;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        color: #1a3d16;
        cursor: pointer;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @media (max-width: 420px) {
        h1 { font-size: 24px; }
        .apple { font-size: 32px; }
        .score-value { font-size: 48px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <!-- 开始页面 -->
      <section id="startPage" class="page start-page active">
        <div>
          <h1>🍎 点击吃苹果</h1>
          <p class="desc">60秒内点击苹果<br/>看谁点得多！</p>
        </div>
        <div class="nickname-input">
          <input type="text" id="nicknameInput" placeholder="请输入你的昵称" maxlength="10" />
        </div>
        <button id="startButton" class="start-button" type="button">开始挑战</button>
        <button id="leaderboardButton" class="leaderboard-button" type="button">🏆 排行榜</button>
        <div class="chip">👆 点击屏幕上的苹果</div>
      </section>

      <!-- 排行榜页面 -->
      <section id="leaderboardPage" class="page leaderboard-page">
        <h1>🏆 排行榜</h1>
        <div class="leaderboard-modal">
          <ul id="leaderboardList2" class="leaderboard-list"></ul>
        </div>
        <button id="backButton" class="back-button" type="button">返回</button>
      </section>

      <!-- 游戏页面 -->
      <section id="gamePage" class="page game-page">
        <header class="topbar">
          <div class="title-block">
            <div class="eyebrow">CLICK · EAT · SCORE</div>
            <h1>点击吃苹果</h1>
          </div>
          <div class="timer-card" aria-live="polite">
            <div class="timer-label">剩余时间</div>
            <div id="timer" class="timer-value">60</div>
          </div>
        </header>

        <section class="game-area" id="gameArea">
          <!-- 苹果会动态生成在这里 -->
        </section>

        <footer class="footer">
          <div class="score-chip">
            <span class="score-label">已吃 </span>
            <span id="counter">0</span>
            <span class="score-label"> 个</span>
          </div>
        </footer>
      </section>

      <!-- 结果页面 -->
      <section id="resultPage" class="page result-page">
        <h1>🎉 挑战结束！</h1>

        <div class="score-display">
          <div class="score-label">你吃掉的苹果</div>
          <div id="finalScore" class="score-value">0</div>
        </div>

        <div class="leaderboard">
          <h3>🏆 排行榜 TOP10</h3>
          <ul id="leaderboardList" class="leaderboard-list">
            <li class="leaderboard-item"><span class="rank">-</span><span>加载中...</span></li>
          </ul>
        </div>

        <button id="restartButton" class="restart-button" type="button">再来一次</button>
      </section>
    </main>

    <script>
      // DOM 元素
      const startPage = document.getElementById('startPage');
      const gamePage = document.getElementById('gamePage');
      const resultPage = document.getElementById('resultPage');
      const leaderboardPage = document.getElementById('leaderboardPage');
      const startButton = document.getElementById('startButton');
      const leaderboardButton = document.getElementById('leaderboardButton');
      const backButton = document.getElementById('backButton');
      const restartButton = document.getElementById('restartButton');
      const timerEl = document.getElementById('timer');
      const counterEl = document.getElementById('counter');
      const finalScoreEl = document.getElementById('finalScore');
      const leaderboardList = document.getElementById('leaderboardList');
      const leaderboardList2 = document.getElementById('leaderboardList2');
      const nicknameInput = document.getElementById('nicknameInput');
      const gameArea = document.getElementById('gameArea');

      // 游戏状态
      let count = 0;
      let timeLeft = 10;
      let timerInterval = null;
      let gameActive = false;

      // 苹果数组
      let apples = [];
      const MAX_APPLES = 8;
      const APPLE_TYPES = ['🍎'];

      // 页面切换
      function showPage(page) {
        startPage.classList.remove('active');
        gamePage.classList.remove('active');
        resultPage.classList.remove('active');
        leaderboardPage.classList.remove('active');
        page.classList.add('active');
      }

      // 渲染排行榜
      function renderLeaderboard(data, container) {
        if (data.leaderboard && data.leaderboard.length > 0) {
          container.innerHTML = data.leaderboard.map((item, idx) => `
            <li class="leaderboard-item">
              <span class="rank">${idx + 1}</span>
              <span class="nickname">${item.nickname}</span>
              <span class="score">${item.score}分</span>
            </li>`).join('');
        } else {
          container.innerHTML = '<li class="leaderboard-item"><span>-暂无数据-</span></li>';
        }
      }

      // 加载排行榜
      async function loadLeaderboard() {
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          renderLeaderboard(data, leaderboardList);
        } catch (e) {
          console.error('加载排行榜失败:', e);
          leaderboardList.innerHTML = '<li class="leaderboard-item"><span>-加载失败-</span></li>';
        }
      }

      // 创建苹果
      function createApple() {
        if (apples.length >= MAX_APPLES) return;

        const apple = document.createElement('div');
        apple.className = 'apple';
        apple.textContent = APPLE_TYPES[Math.floor(Math.random() * APPLE_TYPES.length)];

        // 随机位置（保证在游戏区域內）
        const padding = 50;
        const areaWidth = gameArea.clientWidth - padding * 2;
        const areaHeight = gameArea.clientHeight - padding * 2;

        const x = Math.random() * areaWidth + padding;
        const y = Math.random() * areaHeight + padding;

        apple.style.left = x + 'px';
        apple.style.top = y + 'px';

        // 点击事件
        apple.addEventListener('click', (e) => {
          e.stopPropagation();
          eatApple(apple);
        });

        gameArea.appendChild(apple);
        apples.push(apple);
      }

      // 初始化苹果
      function initApples() {
        // 清除现有苹果
        apples.forEach(a => a.remove());
        apples = [];

        // 创建初始苹果
        for (let i = 0; i < 5; i++) {
          setTimeout(() => createApple(), i * 100);
        }
      }

      // 吃掉苹果
      function eatApple(appleEl) {
        if (!gameActive) return;

        // 增加分数
        count++;
        counterEl.textContent = count;

        // 苹果消失动画
        appleEl.classList.add('eaten');

        // 移除苹果
        setTimeout(() => {
          appleEl.remove();
          const index = apples.indexOf(appleEl);
          if (index > -1) {
            apples.splice(index, 1);
          }
          // 生成新苹果
          createApple();
        }, 300);

        // 显示得分弹出
        showScorePopup(appleEl);
      }

      // 显示得分弹出
      function showScorePopup(appleEl) {
        const rect = appleEl.getBoundingClientRect();
        const areaRect = gameArea.getBoundingClientRect();

        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.textContent = '+1';
        popup.style.left = (rect.left - areaRect.left + 20) + 'px';
        popup.style.top = (rect.top - areaRect.top) + 'px';

        gameArea.appendChild(popup);

        setTimeout(() => popup.remove(), 800);
      }

      // 处理点击
      function handleClick(e) {
        if (!gameActive) return;

        // 检查是否点击到苹果（已经在苹果的点击事件处理了）
        // 这里可以添加点击特效等
      }

      // 开始游戏
      function startGame() {
        const nickname = nicknameInput.value.trim() || '匿名玩家';
        localStorage.setItem('playerNickname', nickname);

        count = 0;
        timeLeft = 60;
        gameActive = true;

        counterEl.textContent = '0';
        timerEl.textContent = '60';
        timerEl.classList.remove('warning');

        // 显示页面
        showPage(gamePage);

        // 初始化苹果
        initApples();

        // 倒计时
        timerInterval = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;

          if (timeLeft <= 3) {
            timerEl.classList.add('warning');
          }

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      // 结束游戏
      function endGame() {
        gameActive = false;
        clearInterval(timerInterval);

        finalScoreEl.textContent = count;

        // 提交分数
        submitScore(count);

        // 获取排行榜
        loadLeaderboard();

        showPage(resultPage);
      }

      // 提交分数
      async function submitScore(score) {
        const nickname = localStorage.getItem('playerNickname') || '匿名玩家';
        try {
          await fetch('/api/submit-score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ score, nickname })
          });
        } catch (e) {
          console.error('提交分数失败:', e);
        }
      }

      // 重新开始
      function restartGame() {
        showPage(startPage);
      }

      // 事件监听
      startButton.addEventListener('click', startGame);
      restartButton.addEventListener('click', restartGame);

      // 排行榜按钮
      leaderboardButton.addEventListener('click', async () => {
        showPage(leaderboardPage);
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          renderLeaderboard(data, leaderboardList2);
        } catch (e) {
          console.error('加载排行榜失败:', e);
          leaderboardList2.innerHTML = '<li class="leaderboard-item"><span>-加载失败-</span></li>';
        }
      });

      // 返回按钮
      backButton.addEventListener('click', () => {
        showPage(startPage);
      });

      // 游戏区域点击（用于检测漏点的苹果）
      gameArea.addEventListener('click', handleClick);
    </script>
  </body>
</html>
