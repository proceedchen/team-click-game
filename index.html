<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>吃苹果长高</title>
    <style>
      :root {
        --bg-0: #2d5a27;
        --bg-1: #1a3d16;
        --bg-2: #234d1e;
        --bg-3: #2d6b2f;
        --text: #ffffff;
        --text-dim: #a8d5a2;
        --accent: #ff6b6b;
        --accent-2: #7bffcc;
        --panel: rgba(22, 35, 54, 0.8);
        --panel-border: rgba(88, 217, 255, 0.15);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(180deg, var(--bg-1), var(--bg-2) 60%, var(--bg-3));
        color: var(--text);
        min-height: 100vh;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      .app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        position: relative;
      }

      .page {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 30px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 300ms ease, visibility 300ms ease;
      }

      .page.active {
        opacity: 1;
        visibility: visible;
      }

      h1 {
        font-size: 32px;
        font-weight: 900;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #ff6b6b, #ffa500);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .desc {
        font-size: 16px;
        color: var(--text-dim);
        line-height: 1.6;
        margin-bottom: 20px;
      }

      /* Start Page */
      .start-page { gap: 20px; }
      .start-page h1 { font-size: 36px; }

      .nickname-input { margin: 10px 0; }
      .nickname-input input {
        width: 200px;
        padding: 12px 16px;
        font-size: 16px;
        border: 2px solid var(--accent);
        border-radius: 10px;
        text-align: center;
        background: rgba(255,255,255,0.1);
        color: white;
        outline: none;
      }
      .nickname-input input::placeholder { color: var(--text-dim); }
      .nickname-input input:focus {
        border-color: var(--accent-2);
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
      }

      .start-button {
        padding: 20px 60px;
        font-size: 22px;
        font-weight: 800;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, #ff6b6b, #ffa500);
        color: white;
        box-shadow: 0 10px 40px rgba(255, 107, 107, 0.4);
        cursor: pointer;
        transition: transform 200ms ease;
      }
      .start-button:active { transform: scale(0.95); }

      .leaderboard-button {
        margin-top: 15px;
        padding: 12px 30px;
        font-size: 16px;
        font-weight: 600;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background: transparent;
        color: rgba(255, 255, 255, 0.8);
        cursor: pointer;
        transition: all 200ms ease;
      }
      .leaderboard-button:active { transform: scale(0.95); }

      .chip {
        margin-top: 20px;
        padding: 8px 16px;
        border-radius: 20px;
        background: rgba(255,255,255,0.08);
        font-size: 12px;
        color: var(--text-dim);
      }

      /* Leaderboard Page */
      .leaderboard-page h1 { font-size: 28px; }

      .leaderboard-modal {
        width: 100%;
        max-width: 320px;
        padding: 20px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
      }

      .leaderboard-modal .leaderboard-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .leaderboard-modal .leaderboard-item {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 15px;
      }

      .leaderboard-modal .rank { color: var(--accent); font-weight: 700; width: 30px; }
      .leaderboard-modal .nickname { flex: 1; text-align: left; padding-left: 10px; color: #fff; }
      .leaderboard-modal .score { font-weight: 700; color: var(--accent-2); }

      .back-button {
        margin-top: 20px;
        padding: 12px 32px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        cursor: pointer;
      }

      /* Game Page */
      .game-page {
        justify-content: space-between;
        padding-top: 20px;
        padding-bottom: 20px;
        overflow: hidden;
      }

      .topbar {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        z-index: 10;
      }

      .title-block { text-align: left; }
      .eyebrow { font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 4px; }
      .topbar h1 { font-size: 20px; margin: 0; }

      .timer-card {
        padding: 10px 20px;
        border-radius: 15px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        text-align: center;
      }
      .timer-label { font-size: 10px; color: var(--text-dim); }
      .timer-value { font-size: 28px; font-weight: 900; color: var(--accent); }
      .timer-value.warning { color: #ff5858; animation: pulse 0.5s infinite; }

      /* Game Area */
      .game-area {
        flex: 1;
        position: relative;
        width: 100%;
        overflow: hidden;
      }

      /* Player */
      .player {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 30px;
        line-height: 1;
        transition: top 0.15s ease, height 0.3s ease;
        display: flex;
        align-items: flex-end;
      }
      .player.eat {
        animation: eatBounce 0.3s ease;
      }
      @keyframes eatBounce {
        0%, 100% { transform: translateX(-50%) scale(1); }
        50% { transform: translateX(-50%) scale(1.2); }
      }

      /* Apple */
      .apple {
        position: absolute;
        font-size: 28px;
        animation: appleFloat 2s ease-in-out infinite;
      }
      @keyframes appleFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      /* Ground */
      .ground {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 20px;
        background: #5d4037;
        border-top: 3px solid #8d6e63;
      }
      .grass {
        position: absolute;
        bottom: 15px;
        left: 0;
        right: 0;
        height: 10px;
        background: linear-gradient(180deg, #4caf50, #388e3c);
      }

      .footer {
        display: flex;
        align-items: center;
        gap: 15px;
        z-index: 10;
      }
      .score-chip {
        padding: 10px 20px;
        border-radius: 25px;
        background: var(--panel);
        border: 1px solid var(--accent);
        font-size: 18px;
        font-weight: 700;
        color: var(--accent-2);
      }
      .score-label { font-size: 12px; color: var(--text-dim); font-weight: 400; }

      /* Height indicator */
      .height-indicator {
        position: absolute;
        right: 10px;
        bottom: 30px;
        width: 8px;
        height: 60%;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
      }
      .height-fill {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(180deg, #ff6b6b, #ffa500);
        border-radius: 4px;
        transition: height 0.3s ease;
      }

      /* Result Page */
      .result-page { gap: 25px; }
      .result-page h1 { font-size: 28px; }

      .score-display {
        padding: 30px 50px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
      }
      .score-label { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }
      .score-value { font-size: 64px; font-weight: 900; color: #ffffff; }

      .leaderboard { width: 100%; max-width: 320px; }
      .leaderboard h3 { margin: 0 0 16px; font-size: 16px; color: var(--text-dim); }
      .leaderboard-list { list-style: none; padding: 0; margin: 0; }
      .leaderboard-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 15px; }
      .leaderboard-item .rank { color: var(--accent); font-weight: 700; width: 30px; }
      .leaderboard-item .nickname { flex: 1; text-align: left; padding-left: 10px; }
      .leaderboard-item .score { font-weight: 700; color: var(--accent-2); }

      .restart-button {
        padding: 16px 48px;
        font-size: 18px;
        font-weight: 700;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        color: var(--bg-0);
        cursor: pointer;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @media (max-width: 420px) {
        h1 { font-size: 24px; }
        .player { font-size: 24px; }
        .apple { font-size: 22px; }
        .score-value { font-size: 48px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <!-- 开始页面 -->
      <section id="startPage" class="page start-page active">
        <div>
          <h1>🍎 吃苹果长高</h1>
          <p class="desc">10秒内吃掉苹果<br/>让自己越长越高！</p>
        </div>
        <div class="nickname-input">
          <input type="text" id="nicknameInput" placeholder="请输入你的昵称" maxlength="10" />
        </div>
        <button id="startButton" class="start-button" type="button">开始挑战</button>
        <button id="leaderboardButton" class="leaderboard-button" type="button">🏆 排行榜</button>
        <div class="chip">⬅️⬆️⬇️➡️ 使用方向键移动</div>
      </section>

      <!-- 排行榜页面 -->
      <section id="leaderboardPage" class="page leaderboard-page">
        <h1>🏆 排行榜</h1>
        <div class="leaderboard-modal">
          <ul id="leaderboardList2" class="leaderboard-list"></ul>
        </div>
        <button id="backButton" class="back-button" type="button">返回</button>
      </section>

      <!-- 游戏页面 -->
      <section id="gamePage" class="page game-page">
        <header class="topbar">
          <div class="title-block">
            <div class="eyebrow">EAT · GROW · WIN</div>
            <h1>吃苹果长高</h1>
          </div>
          <div class="timer-card" aria-live="polite">
            <div class="timer-label">剩余时间</div>
            <div id="timer" class="timer-value">10</div>
          </div>
        </header>

        <section class="game-area" id="gameArea">
          <div id="player" class="player">😐</div>
          <div class="ground"></div>
          <div class="grass"></div>
          <div class="height-indicator">
            <div id="heightFill" class="height-fill" style="height: 10%"></div>
          </div>
        </section>

        <footer class="footer">
          <div class="score-chip">
            <span class="score-label">吃掉 </span>
            <span id="counter">0</span>
            <span class="score-label"> 个苹果</span>
          </div>
        </footer>
      </section>

      <!-- 结果页面 -->
      <section id="resultPage" class="page result-page">
        <h1>🎉 挑战结束！</h1>

        <div class="score-display">
          <div class="score-label">你吃掉的苹果</div>
          <div id="finalScore" class="score-value">0</div>
        </div>

        <div class="leaderboard">
          <h3>🏆 排行榜 TOP10</h3>
          <ul id="leaderboardList" class="leaderboard-list">
            <li class="leaderboard-item"><span class="rank">-</span><span>加载中...</span></li>
          </ul>
        </div>

        <button id="restartButton" class="restart-button" type="button">再来一次</button>
      </section>
    </main>

    <script>
      // DOM 元素
      const startPage = document.getElementById('startPage');
      const gamePage = document.getElementById('gamePage');
      const resultPage = document.getElementById('resultPage');
      const leaderboardPage = document.getElementById('leaderboardPage');
      const startButton = document.getElementById('startButton');
      const leaderboardButton = document.getElementById('leaderboardButton');
      const backButton = document.getElementById('backButton');
      const restartButton = document.getElementById('restartButton');
      const timerEl = document.getElementById('timer');
      const counterEl = document.getElementById('counter');
      const finalScoreEl = document.getElementById('finalScore');
      const leaderboardList = document.getElementById('leaderboardList');
      const leaderboardList2 = document.getElementById('leaderboardList2');
      const nicknameInput = document.getElementById('nicknameInput');
      const playerEl = document.getElementById('player');
      const heightFill = document.getElementById('heightFill');
      const gameArea = document.getElementById('gameArea');

      // 游戏状态
      let count = 0;
      let timeLeft = 10;
      let timerInterval = null;
      let gameActive = false;
      let playerX = 50; // 百分比（左右）
      let playerY = 80; // 百分比（上下，0是顶部）
      let playerHeight = 15; // 百分比，最小高度
      const MIN_HEIGHT = 15;
      const MAX_HEIGHT = 90;
      const MOVE_SPEED = 4;
      const MOVE_SPEED_Y = 5;
      const HEIGHT_INCREMENT = 8;
      const GROUND_Y = 85; // 地面位置（百分比）

      // 苹果数组
      let apples = [];
      const INITIAL_APPLE_COUNT = 3;

      // 按键状态
      const keysPressed = {};

      // 页面切换
      function showPage(page) {
        startPage.classList.remove('active');
        gamePage.classList.remove('active');
        resultPage.classList.remove('active');
        leaderboardPage.classList.remove('active');
        page.classList.add('active');
      }

      // 渲染排行榜
      function renderLeaderboard(data, container) {
        if (data.leaderboard && data.leaderboard.length > 0) {
          container.innerHTML = data.leaderboard.map((item, idx) => `
            <li class="leaderboard-item">
              <span class="rank">${idx + 1}</span>
              <span class="nickname">${item.nickname}</span>
              <span class="score">${item.score}分</span>
            </li>`).join('');
        } else {
          container.innerHTML = '<li class="leaderboard-item"><span>-暂无数据-</span></li>';
        }
      }

      // 加载排行榜
      async function loadLeaderboard() {
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          renderLeaderboard(data, leaderboardList);
        } catch (e) {
          console.error('加载排行榜失败:', e);
          leaderboardList.innerHTML = '<li class="leaderboard-item"><span>-加载失败-</span></li>';
        }
      }

      // 创建苹果
      function createApple() {
        const apple = document.createElement('div');
        apple.className = 'apple';
        apple.textContent = '🍎';

        // 随机位置（避免与角色重叠太多的区域）
        const areaHeight = gameArea.clientHeight - 60; // 留出底部空间
        const areaWidth = gameArea.clientWidth;

        const x = Math.random() * (areaWidth - 40) + 10;
        const y = Math.random() * (areaHeight - 100) + 50; // 保证在可移动范围内

        apple.style.left = x + 'px';
        apple.style.top = y + 'px';

        gameArea.appendChild(apple);
        return {
          element: apple,
          x: x,
          y: y,
          width: 28,
          height: 28
        };
      }

      // 初始化苹果
      function initApples() {
        // 清除现有苹果
        apples.forEach(a => a.element.remove());
        apples = [];

        // 创建初始苹果
        for (let i = 0; i < INITIAL_APPLE_COUNT; i++) {
          apples.push(createApple());
        }
      }

      // 检测碰撞
      function checkCollision() {
        const playerRect = playerEl.getBoundingClientRect();

        for (let i = apples.length - 1; i >= 0; i--) {
          const apple = apples[i];
          const appleRect = apple.element.getBoundingClientRect();

          // 简单的矩形碰撞检测
          if (playerRect.right > appleRect.left &&
              playerRect.left < appleRect.right &&
              playerRect.bottom > appleRect.top &&
              playerRect.top < appleRect.bottom) {
            // 吃到苹果
            eatApple(i);
          }
        }
      }

      // 吃掉苹果
      function eatApple(index) {
        const apple = apples[index];

        // 移除苹果
        apple.element.remove();
        apples.splice(index, 1);

        // 增加分数
        count++;
        counterEl.textContent = count;

        // 角色动画
        playerEl.classList.add('eat');
        setTimeout(() => playerEl.classList.remove('eat'), 300);

        // 长高
        if (playerHeight < MAX_HEIGHT) {
          playerHeight = Math.min(playerHeight + HEIGHT_INCREMENT, MAX_HEIGHT);
          playerEl.style.height = playerHeight + '%';
          // 更新垂直位置（基于底部）
          playerEl.style.top = (GROUND_Y - playerHeight / 2) + '%';

          // 更新高度指示条
          const heightPercent = ((playerHeight - MIN_HEIGHT) / (MAX_HEIGHT - MIN_HEIGHT)) * 100;
          heightFill.style.height = heightPercent + '%';

          // 根据高度改变表情
          if (playerHeight < 30) {
            playerEl.textContent = '😐';
          } else if (playerHeight < 50) {
            playerEl.textContent = '🙂';
          } else if (playerHeight < 70) {
            playerEl.textContent = '😄';
          } else {
            playerEl.textContent = '😎';
          }
        }

        // 在随机位置生成新苹果
        setTimeout(() => {
          if (gameActive) {
            apples.push(createApple());
          }
        }, 300);
      }

      // 更新玩家位置
      function updatePlayer() {
        if (!gameActive) return;

        const gameAreaRect = gameArea.getBoundingClientRect();
        const moveAmountX = (MOVE_SPEED / gameAreaRect.width) * 100;
        const moveAmountY = (MOVE_SPEED_Y / gameAreaRect.height) * 100;

        // 左右移动
        if (keysPressed['ArrowLeft'] || keysPressed['a'] || keysPressed['A']) {
          playerX = Math.max(moveAmountX, playerX - moveAmountX);
        }
        if (keysPressed['ArrowRight'] || keysPressed['d'] || keysPressed['D']) {
          playerX = Math.min(100 - moveAmountX, playerX + moveAmountX);
        }

        // 上下移动
        if (keysPressed['ArrowUp'] || keysPressed['w'] || keysPressed['W']) {
          playerY = Math.max(moveAmountY + playerHeight/2, playerY - moveAmountY);
        }
        if (keysPressed['ArrowDown'] || keysPressed['s'] || keysPressed['S']) {
          playerY = Math.min(GROUND_Y - playerHeight/2, playerY + moveAmountY);
        }

        playerEl.style.left = playerX + '%';
        playerEl.style.top = playerY + '%';
      }

      // 游戏循环
      function gameLoop() {
        if (!gameActive) return;

        updatePlayer();
        checkCollision();

        requestAnimationFrame(gameLoop);
      }

      // 处理按键
      function handleKeyDown(e) {
        if (!gameActive) return;

        const validKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D'];
        if (validKeys.includes(e.key)) {
          keysPressed[e.key] = true;
          e.preventDefault();
        }
      }

      // 处理按键释放
      function handleKeyUp(e) {
        delete keysPressed[e.key];
      }

      // 开始游戏
      function startGame() {
        const nickname = nicknameInput.value.trim() || '匿名玩家';
        localStorage.setItem('playerNickname', nickname);

        count = 0;
        timeLeft = 10;
        gameActive = true;
        playerX = 50;
        playerY = GROUND_Y - playerHeight / 2;
        playerHeight = MIN_HEIGHT;

        counterEl.textContent = '0';
        timerEl.textContent = '10';
        timerEl.classList.remove('warning');

        // 重置角色
        playerEl.style.left = '50%';
        playerEl.style.top = playerY + '%';
        playerEl.style.height = playerHeight + '%';
        playerEl.style.bottom = 'auto';
        playerEl.style.transform = 'translate(-50%, 50%)';
        playerEl.textContent = '😐';

        // 重置高度指示条
        heightFill.style.height = '10%';

        // 显示页面
        showPage(gamePage);

        // 初始化苹果
        initApples();

        // 启动游戏循环
        gameLoop();

        // 倒计时
        timerInterval = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;

          if (timeLeft <= 3) {
            timerEl.classList.add('warning');
          }

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      // 结束游戏
      function endGame() {
        gameActive = false;
        clearInterval(timerInterval);

        finalScoreEl.textContent = count;

        // 提交分数
        submitScore(count);

        // 获取排行榜
        loadLeaderboard();

        showPage(resultPage);
      }

      // 提交分数
      async function submitScore(score) {
        const nickname = localStorage.getItem('playerNickname') || '匿名玩家';
        try {
          await fetch('/api/submit-score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ score, nickname })
          });
        } catch (e) {
          console.error('提交分数失败:', e);
        }
      }

      // 重新开始
      function restartGame() {
        showPage(startPage);
      }

      // 事件监听
      startButton.addEventListener('click', startGame);
      restartButton.addEventListener('click', restartGame);

      // 排行榜按钮
      leaderboardButton.addEventListener('click', async () => {
        showPage(leaderboardPage);
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          renderLeaderboard(data, leaderboardList2);
        } catch (e) {
          console.error('加载排行榜失败:', e);
          leaderboardList2.innerHTML = '<li class="leaderboard-item"><span>-加载失败-</span></li>';
        }
      });

      // 返回按钮
      backButton.addEventListener('click', () => {
        showPage(startPage);
      });

      // 键盘事件
      document.addEventListener('keydown', handleKeyDown);
      document.addEventListener('keyup', handleKeyUp);

      // 触摸事件（手机端支持滑动移动）
      let touchStartX = 0;
      let touchStartY = 0;

      document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        if (!gameActive) return;

        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;
        const dx = touchX - touchStartX;
        const dy = touchY - touchStartY;

        // 根据滑动方向设置按键状态
        keysPressed['ArrowLeft'] = dx < -20;
        keysPressed['ArrowRight'] = dx > 20;
        keysPressed['ArrowUp'] = dy < -20;
        keysPressed['ArrowDown'] = dy > 20;

        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchend', (e) => {
        // 清除所有移动按键
        delete keysPressed['ArrowLeft'];
        delete keysPressed['ArrowRight'];
        delete keysPressed['ArrowUp'];
        delete keysPressed['ArrowDown'];

        // 检测点击位置是否有苹果（触摸点击）
        if (!gameActive) return;

        const touch = e.changedTouches[0];
        const clickX = touch.clientX;
        const clickY = touch.clientY;

        // 检测是否点击到苹果
        for (let i = apples.length - 1; i >= 0; i--) {
          const apple = apples[i];
          const rect = apple.element.getBoundingClientRect();

          if (clickX >= rect.left && clickX <= rect.right &&
              clickY >= rect.top && clickY <= rect.bottom) {
            // 吃到苹果
            eatApple(i);
            break;
          }
        }
      }, { passive: true });
    </script>
  </body>
</html>
